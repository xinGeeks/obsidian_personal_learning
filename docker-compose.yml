services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ${VAULT_PATH:-~/obsidian-vault}:/vault:ro
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - VAULT_PATH=/vault
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
